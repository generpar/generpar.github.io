<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .card {
            background: white; padding: 2rem; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
        }
        h2 { text-align: center; margin: 0 0 1.5rem; color: #333; }
        .output-box { display: flex; gap: 8px; margin-bottom: 1.5rem; }
        #password {
            flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;
            font-family: monospace; font-size: 1.1rem; background: #f8f9fa;
            outline: none; transition: border 0.2s;
        }
        #password:focus { border-color: #667eea; }
        .btn {
            padding: 10px 14px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .btn-copy { background: #667eea; color: white; }
        .btn-copy:hover { background: #5a6fd6; }
        .btn-gen {
            width: 100%; padding: 14px; background: #48bb78; color: white;
            font-size: 1rem; margin-top: 1rem;
        }
        .btn-gen:hover { background: #38a169; }
        .controls { margin-bottom: 1rem; }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        input[type="range"] { flex: 1; margin: 0 10px; accent-color: #667eea; }
        label { cursor: pointer; user-select: none; color: #444; }
        input[type="checkbox"] { margin-right: 8px; accent-color: #667eea; transform: scale(1.2); }
        #length-val { font-weight: bold; min-width: 24px; text-align: center; }
        .error { color: #e53e3e; font-size: 0.85rem; text-align: center; height: 1.2em; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Генератор паролей</h2>
        <div class="output-box">
            <input type="text" id="password" readonly placeholder="Здесь появится пароль">
            <button class="btn btn-copy" onclick="copyPassword()">📋</button>
        </div>
        <div class="controls">
            <div class="row">
                <label for="length">Длина: <span id="length-val">12</span></label>
                <input type="range" id="length" min="4" max="32" value="12" oninput="document.getElementById('length-val').textContent = this.value">
            </div>
            <div class="row"><label><input type="checkbox" id="upper" checked> Заглавные (A-Z)</label></div>
            <div class="row"><label><input type="checkbox" id="lower" checked> Строчные (a-z)</label></div>
            <div class="row"><label><input type="checkbox" id="nums" checked> Цифры (0-9)</label></div>
            <div class="row"><label><input type="checkbox" id="syms" checked> Символы (!@#$)</label></div>
        </div>
        <p class="error" id="error-msg"></p>
        <button class="btn btn-gen" onclick="generate()">Сгенерировать</button>
    </div>

    <script>
        const passField = document.getElementById('password');
        const errorMsg = document.getElementById('error-msg');

        function secureRandomChar(str) {
            const arr = new Uint32Array(1);
            window.crypto.getRandomValues(arr);
            return str[arr[0] % str.length];
        }

        function generate() {
            errorMsg.textContent = '';
            const len = parseInt(document.getElementById('length').value);
            const upper = document.getElementById('upper').checked;
            const lower = document.getElementById('lower').checked;
            const nums = document.getElementById('nums').checked;
            const syms = document.getElementById('syms').checked;

            if (!upper && !lower && !nums && !syms) {
                errorMsg.textContent = '⚠️ Выберите хотя бы один набор символов';
                return;
            }

            let chars = '';
            if (upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (lower) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (nums) chars += '0123456789';
            if (syms) chars += '!@#$%^&*()_+~`|}{[]:;?><,./-=';

            let password = '';
            for (let i = 0; i < len; i++) {
                password += secureRandomChar(chars);
            }
            passField.value = password;
        }

        function copyPassword() {
            if (!passField.value) return;
            navigator.clipboard.writeText(passField.value)
                .then(() => {
                    const btn = document.querySelector('.btn-copy');
                    const orig = btn.textContent;
                    btn.textContent = '✅';
                    setTimeout(() => btn.textContent = orig, 1500);
                })
                .catch(() => {
                    passField.select();
                    document.execCommand('copy');
                    alert('Пароль скопирован!');
                });
        }
    </script>
</body>
</html>
